<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Francisco García Rivera - Portfolio</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%231a1a1a'/%3E%3Ccircle cx='9' cy='9' r='3' fill='%23f97316'/%3E%3Ccircle cx='16' cy='9' r='2' fill='%23e5e7eb' opacity='0.6'/%3E%3Ccircle cx='23' cy='9' r='2' fill='%23e5e7eb' opacity='0.6'/%3E%3Ccircle cx='9' cy='16' r='2' fill='%23e5e7eb' opacity='0.6'/%3E%3Ccircle cx='16' cy='16' r='2.5' fill='%23e5e7eb' opacity='0.8'/%3E%3Ccircle cx='23' cy='16' r='2' fill='%23e5e7eb' opacity='0.6'/%3E%3Ccircle cx='9' cy='23' r='2' fill='%23e5e7eb' opacity='0.6'/%3E%3Ccircle cx='16' cy='23' r='2' fill='%23e5e7eb' opacity='0.6'/%3E%3Ccircle cx='23' cy='23' r='3' fill='%23f97316'/%3E%3C/svg%3E" />
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f0f0f0; font-family: 'Courier Prime', monospace; }
      #root { width: 100%; height: 100%; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #333; border-radius: 0px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.body.innerHTML = '<pre style="position:fixed;inset:0;padding:24px;background:#1a1a1a;color:#f97316;font-size:13px;overflow:auto;z-index:9999;white-space:pre-wrap;">'
          + 'ERROR: ' + msg + '\n\nFile: ' + src + ':' + line
          + (err ? '\n\nStack:\n' + err.stack : '') + '</pre>';
      };
      window.onunhandledrejection = function(e) {
        document.body.innerHTML = '<pre style="position:fixed;inset:0;padding:24px;background:#1a1a1a;color:#f97316;font-size:13px;overflow:auto;z-index:9999;white-space:pre-wrap;">'
          + 'UNHANDLED REJECTION:\n' + (e.reason?.stack || e.reason) + '</pre>';
      };
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
